name: Release
on:
  push:
    branches:
      - main
      - pipeline-sandbox
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: "--bundles msi"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install LLVM/Clang (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $GITHUB_ENV

      - name: Install LLVM/Clang (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=$(brew --prefix llvm)/bin/llvm-config" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      - name: Install Frontend Dependencies
        working-directory: viewer
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          LIBCLANG_PATH: ${{ matrix.platform == 'windows-latest' && 'C:\Program Files\LLVM\bin' || '/opt/homebrew/opt/llvm/lib' }}
        with:
          projectPath: viewer
          tagName: app-v__VERSION__
          releaseName: "HALT Triage App v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --features native_ml

      - name: Setup Microsoft Store CLI
        if: matrix.platform == 'windows-latest'
        uses: microsoft/setup-msstore-cli@v1

      - name: Package MSIX for Store
        if: matrix.platform == 'windows-latest'
        run: python dev/build_and_deploy.py --msix --zip-only --no-bump

      - name: Publish to Microsoft Store
        if: matrix.platform == 'windows-latest'
        env:
          TENANT_ID: ${{ secrets.STORE_TENANT_ID }}
          CLIENT_ID: ${{ secrets.STORE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.STORE_CLIENT_SECRET }}
          SELLER_ID: ${{ secrets.STORE_SELLER_ID }}
          APP_ID: ${{ secrets.STORE_APP_ID }}
        run: |
          msstore reconfigure --tenantId $env:TENANT_ID --sellerId $env:SELLER_ID --clientId $env:CLIENT_ID --clientSecret $env:CLIENT_SECRET
          msstore submission publish $env:APP_ID --package-path "builds/*.msix"

  ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Install LLVM/Clang (iOS)
        run: brew install llvm

      - name: Install Apple Certificates and Profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile using Python to ensure robust decoding (ignoring headers/newlines)
          python3 -c "import base64, os, re; \
            cert = os.environ['BUILD_CERTIFICATE_BASE64']; \
            pp = os.environ['BUILD_PROVISION_PROFILE_BASE64']; \
            cert = re.sub(r'-----.*?-----|\s+', '', cert); \
            pp = re.sub(r'-----.*?-----|\s+', '', pp); \
            cert += '=' * ((4 - len(cert) % 4) % 4); \
            pp += '=' * ((4 - len(pp) % 4) % 4); \
            open('$CERTIFICATE_PATH', 'wb').write(base64.b64decode(cert)); \
            open('$PP_PATH', 'wb').write(base64.b64decode(pp))"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build and Transpile Frontend
        working-directory: viewer
        run: npm ci && npm run build

      - name: Tauri iOS Build
        working-directory: viewer
        env:
          LIBCLANG_PATH: '/opt/homebrew/opt/llvm/lib'
        run: |
          npm run tauri ios build -- --export-method app-store-connect

      - name: Upload to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID_EMAIL }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun altool --upload-app -f viewer/src-tauri/gen/apple/build/arm64/HALT.ipa -t ios -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD"
