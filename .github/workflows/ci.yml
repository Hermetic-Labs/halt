name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install lint dependencies
        run: pip install flake8 pyflakes

      - name: Flake8 (errors only — F-codes)
        run: flake8 api/ --select=F --exclude=__pycache__

  frontend:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck + build
        run: npm run build

      - name: ESLint
        run: npm run lint
