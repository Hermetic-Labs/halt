name: Release iOS
on:
  push:
    branches:
      - main
      - pipeline-sandbox
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Install LLVM/Clang (iOS)
        run: |
          brew install llvm cmake ninja
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=$(brew --prefix llvm)/bin/llvm-config" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV
          echo "CXXFLAGS=-D_LIBCPP_DISABLE_AVAILABILITY" >> $GITHUB_ENV

      - name: Install Apple Certificates and Profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          export CERTIFICATE_PATH
          export PP_PATH
          python3 - <<'EOF'
          import base64, os, re, sys
          print('\n[LOG] Starting Certificate Decoding...')
          cert = os.environ.get('BUILD_CERTIFICATE_BASE64', '')
          pp = os.environ.get('BUILD_PROVISION_PROFILE_BASE64', '')
          if not cert:
              print('[ERROR] IOS_P12_BASE64 secret is completely empty!')
              sys.exit(1)
          print(f'[DEBUG] Raw cert length: {len(cert)}')
          cert = re.sub(r'-----.*?-----|\s+', '', cert)
          pp = re.sub(r'-----.*?-----|\s+', '', pp)
          cert += '=' * ((4 - len(cert) % 4) % 4)
          pp += '=' * ((4 - len(pp) % 4) % 4)
          print(f'[DEBUG] Cleaned cert length: {len(cert)}')
          try:
              open(os.environ['CERTIFICATE_PATH'], 'wb').write(base64.b64decode(cert, validate=True))
              open(os.environ['PP_PATH'], 'wb').write(base64.b64decode(pp))
              print('[DEBUG] Successfully decoded base64 to binary files.')
          except Exception as e:
              print(f'[CRITICAL ERROR] Python Base64 Decoding Failed: {e}')
              sys.exit(1)
          EOF

          echo "Creating temporary keychain..."
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "Importing PKCS12 Certificate into Keychain..."
          security import $CERTIFICATE_PATH -P "${P12_PASSWORD}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH || { echo "[ERROR] Security Import Failed! The .p12 file is corrupt or the password is wrong."; exit 1; }
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Install Frontend Dependencies
        working-directory: viewer
        run: npm ci && npm run build

      - name: Tauri iOS Build
        working-directory: viewer
        env:
          ORT_STRATEGY: compile
        run: |
          npm run tauri ios build -- --export-method app-store-connect

      - name: Upload to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID_EMAIL }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun altool --upload-app -f viewer/src-tauri/gen/apple/build/arm64/HALT.ipa -t ios -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD"
