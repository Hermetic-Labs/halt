name: Build macOS Distribution

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Upload to R2 after build'
        type: boolean
        default: true

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (M1/M2)
            arch: arm64
          - runner: macos-15-intel   # Intel (x86_64)
            arch: x64

    runs-on: ${{ matrix.runner }}
    name: macOS (${{ matrix.arch }})
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up system Python (for build script)
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install boto3 (for R2 upload)
        if: ${{ inputs.deploy }}
        run: pip install boto3

      - name: Build macOS distribution
        run: python dev/build_and_deploy.py --platform mac --no-bump
      
      - name: Upload to R2
        if: ${{ inputs.deploy }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          # Find the ZIP that was just created
          ZIP_FILE=$(ls builds/HALT-v*-macOS-*.zip | head -1)
          VERSION=$(python -c "import json; print(json.loads(open('dev/electron-launcher/package.json').read())['version'])")
          ARCH="${{ matrix.arch }}"
          PLATFORM="macOS-${ARCH}"
          
          echo "Uploading ${ZIP_FILE} to R2..."
          python -c "
          import boto3, os, sys
          from boto3.s3.transfer import TransferConfig
          
          s3 = boto3.client('s3',
              endpoint_url=f'https://{os.environ[\"R2_ACCOUNT_ID\"]}.r2.cloudflarestorage.com',
              aws_access_key_id=os.environ['R2_ACCESS_KEY'],
              aws_secret_access_key=os.environ['R2_SECRET_KEY'],
              region_name='auto')
          
          config = TransferConfig(multipart_threshold=100*1024*1024, max_concurrency=4,
                                  multipart_chunksize=100*1024*1024, use_threads=True)
          
          zip_path = '${ZIP_FILE}'
          version = '${VERSION}'
          platform = '${PLATFORM}'
          
          # Upload versioned
          obj_name = f'HALT-v{version}-{platform}.zip'
          print(f'  Uploading {obj_name}...')
          s3.upload_file(zip_path, 'hermetic-labs-triage', obj_name, Config=config)
          
          # Upload as latest
          latest_name = f'HALT-latest-{platform}.zip'
          print(f'  Uploading {latest_name}...')
          s3.upload_file(zip_path, 'hermetic-labs-triage', latest_name, Config=config)
          
          print(f'  Done! Public URL:')
          print(f'  https://pub-b841d8ac01084f8f822078f923a49a87.r2.dev/{obj_name}')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: halt-macos-${{ matrix.arch }}
          path: builds/HALT-v*-macOS-*.zip
          retention-days: 30

      - name: Summary
        run: |
          ZIP_FILE=$(ls builds/HALT-v*-macOS-*.zip | head -1)
          ZIP_SIZE=$(du -h "$ZIP_FILE" | cut -f1)
          echo "### ✅ macOS Build Complete (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | $(basename $ZIP_FILE) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $ZIP_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Arch** | ${{ matrix.arch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | ${{ matrix.runner }} |" >> $GITHUB_STEP_SUMMARY
